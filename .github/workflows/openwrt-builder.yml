name: ImmortalWrt Builder

permissions:
  contents: write

on:
  repository_dispatch:
    types: [ "Source Code Update" ]
  workflow_dispatch:
    inputs:
      device:
        description: '编译设备型号'
        required: true
        type: choice
        default: 'all'
        options:
          - '256M'
          - '256M-Lite'
          - '128M'
          - '128M-Ubootmod'
          - 'all'
      repo:
        description: '指定源码仓库地址'
        required: true
        type: string
        default: 'https://github.com/padavanonly/immortalwrt-mt798x-6.6'
      commit:
        description: '指定源码commit进行编译，留空拉取最新源码'
        required: false
        type: string
        default: ''
      ssh:
        description: '是否执行 make menuconfig, 编译设备为 all 时无效'
        required: false
        type: boolean
        default: false
      release:
        description: '是否发布编译产物到 Release'
        required: false
        type: boolean
        default: true
      prerelease:
        description: '是否发布为预发布版本 (Pre-release)'
        required: false
        type: boolean
        default: false

env:
  DEVICE_INPUT: ${{ github.event.inputs.device || github.event.client_payload.device }}
  CCACHE_DIR: /workdir/.ccache
  CCACHE_MAXSIZE: 2G
  REPO_URL: ${{ github.event.inputs.repo }}
  REPO_BRANCH: openwrt-24.10-6.6
  REPO_COMMIT: ${{ github.event.inputs.commit }}
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_RELEASE: ${{ github.event.inputs.release }}
  PRERELEASE: ${{ github.event.inputs.prerelease }}
  TZ: Asia/Shanghai

jobs:
  menuconfig:
    name: ⚙️ Menuconfig & Push
    if: github.event.inputs.ssh == 'true' && github.event.inputs.device != 'all'
    runs-on: ubuntu-22.04
    steps:
      - name: 🙌 Checkout
        uses: actions/checkout@main

      - name: 🛠️ Init Environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libncurses-dev build-essential git wget python3 bzip2
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 🪜 Clone source code
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: 🔧 Set device variables
        run: |
          case "$DEVICE_INPUT" in
            "256M")
              echo "CONFIG_FILE=config/256m.config" >> $GITHUB_ENV
              echo "CUSTOM_DIY_P1_SH=diy-part1.sh" >> $GITHUB_ENV
              echo "CUSTOM_DIY_P2_SH=diy-part2.sh" >> $GITHUB_ENV
              ;;
            "256M-Lite")
              echo "CONFIG_FILE=config/256m-lite.config" >> $GITHUB_ENV
              echo "CUSTOM_DIY_P1_SH=lite/diy-part1.sh" >> $GITHUB_ENV
              echo "CUSTOM_DIY_P2_SH=lite/diy-part2.sh" >> $GITHUB_ENV
              ;;
            "128M")
              echo "CONFIG_FILE=config/128m.config" >> $GITHUB_ENV
              echo "CUSTOM_DIY_P1_SH=diy-part1.sh" >> $GITHUB_ENV
              echo "CUSTOM_DIY_P2_SH=diy-part2.sh" >> $GITHUB_ENV
              ;;
            "128M-Ubootmod")
              echo "CONFIG_FILE=config/128muboot.config" >> $GITHUB_ENV
              echo "CUSTOM_DIY_P1_SH=diy-part1.sh" >> $GITHUB_ENV
              echo "CUSTOM_DIY_P2_SH=diy-part2.sh" >> $GITHUB_ENV
              ;;
          esac

      - name: 👩‍💻 Copy previous config if exists
        run: |
          if [ -f "$GITHUB_WORKSPACE/${CONFIG_FILE}" ]; then
            cp -f "$GITHUB_WORKSPACE/${CONFIG_FILE}" /workdir/openwrt/.config
          fi

      - name: ⚙️ Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $CUSTOM_DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$CUSTOM_DIY_P1_SH

      - name: 🧬 Update & Install feeds
        run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: 🧩 Load custom configuration
        run: |
          [ -e $CONFIG_FILE ] && cp -f $CONFIG_FILE openwrt/.config
          chmod +x $CUSTOM_DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$CUSTOM_DIY_P2_SH

      - name: ⌨️ SSH connection to Menuconfig
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 15

      - name: 📤 Push config to main branch
        run: |
          SRC="/workdir/openwrt/.config"
          DST="$GITHUB_WORKSPACE/${CONFIG_FILE}"
          mkdir -p "$(dirname "$DST")"
          cp -f "$SRC" "$DST"
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CONFIG_FILE"
          git diff --cached --quiet || (git commit -m "Update config: ${CONFIG_FILE}" && git push origin HEAD:main)

  build:
    name: 🔨 Build Firmware
    needs: menuconfig
    if: always() && (needs.menuconfig.result == 'success' || needs.menuconfig.result == 'skipped')
    runs-on: ubuntu-22.04

    steps:
      - name: 🙌 Checkout
        uses: actions/checkout@main

      - name: 🪠 Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: 🛠️ Init Environment
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 🪜 Clone source code
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          if [ -n "${REPO_COMMIT}" ]; then
            cd openwrt && git checkout ${REPO_COMMIT}
          fi
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: ⚙️ Setup ccache & DL cache
        uses: actions/cache@main
        with:
          path: |
            /workdir/.ccache
            /workdir/openwrt/dl
          key: ${{ runner.os }}-openwrt-combined-${{ env.REPO_BRANCH }}-${{ hashFiles('config/*.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-combined-${{ env.REPO_BRANCH }}-

      - name: 🔧 Configure ccache
        run: |
          ccache --set-config=max_size=$CCACHE_MAXSIZE
          ccache --set-config=cache_dir=$CCACHE_DIR
          ccache --set-config=compression=true
          ccache -z

      - name: 🔨 Multi-Device Compilation Loop
        id: compile
        run: |
          # 1. 确定编译列表
          if [ "${DEVICE_INPUT}" = "all" ]; then
            DEVICES="256M 256M-Lite 128M 128M-Ubootmod"
          else
            DEVICES="${DEVICE_INPUT}"
          fi

          mkdir -p $GITHUB_WORKSPACE/firmware_collection
          cd /workdir/openwrt

          for DEV in $DEVICES; do
            echo "::group::🚀 Building $DEV"

            # 2. 设置当前设备配置文件和自定义脚本
            case "$DEV" in
              "256M")
                CONFIG="config/256m.config"
                CUR_DIY_P1="$GITHUB_WORKSPACE/diy-part1.sh"
                CUR_DIY_P2="$GITHUB_WORKSPACE/diy-part2.sh"
                ;;
              "256M-Lite")
                CONFIG="config/256m-lite.config"
                CUR_DIY_P1="$GITHUB_WORKSPACE/lite/diy-part1.sh"
                CUR_DIY_P2="$GITHUB_WORKSPACE/lite/diy-part2.sh"
                ;;
              "128M")
                CONFIG="config/128m.config"
                CUR_DIY_P1="$GITHUB_WORKSPACE/diy-part1.sh"
                CUR_DIY_P2="$GITHUB_WORKSPACE/diy-part2.sh"
                ;;
              "128M-Ubootmod")
                CONFIG="config/128muboot.config"
                CUR_DIY_P1="$GITHUB_WORKSPACE/diy-part1.sh"
                CUR_DIY_P2="$GITHUB_WORKSPACE/diy-part2.sh"
                ;;
            esac

            echo "Using Config: $CONFIG"
            echo "Using DIY Part1: $CUR_DIY_P1"
            echo "Using DIY Part2: $CUR_DIY_P2"

            # 3. 每轮设备编译前恢复源码树到干净状态（保留 dl 缓存）
            git -C /workdir/openwrt reset --hard
            git -C /workdir/openwrt clean -fd

            # 4. 重新加载 feeds 和自定义脚本
            [ -e $GITHUB_WORKSPACE/$FEEDS_CONF ] && cp -f $GITHUB_WORKSPACE/$FEEDS_CONF feeds.conf.default
            chmod +x "$CUR_DIY_P1"
            "$CUR_DIY_P1"
            ./scripts/feeds update -a
            ./scripts/feeds install -a

            # 5. 加载配置并执行第二阶段自定义
            cp -f "$GITHUB_WORKSPACE/$CONFIG" .config
            chmod +x "$CUR_DIY_P2"
            "$CUR_DIY_P2"

            # 6. 刷新配置并下载
            make defconfig
            make download -j$(nproc)

            # 7. 开始编译
            if ! make -j$(nproc) CC="ccache gcc" CXX="ccache g++"; then
              echo "⚠️ Multi-threaded failed, retrying single-threaded..."
              make -j1 V=s || exit 1
            fi

            echo "📥 Collecting artifacts for $DEV"
            find bin/targets/ -name "*sysupgrade.bin" | while read -r file; do
              cp "$file" "$GITHUB_WORKSPACE/firmware_collection/${DEV}-$(basename "$file")"
            done

            echo "✅ $DEV build finished."
            df -hT /workdir
            echo "::endgroup::"
          done

          echo "status=success" >> $GITHUB_OUTPUT

      - name: 🪄 Upload Binaries (Artifacts)
        uses: actions/upload-artifact@main
        if: steps.compile.outputs.status == 'success'
        with:
          name: ImmortalWrt_Combined_${{ env.DEVICE_INPUT }}_${{ env.REPO_BRANCH }}
          path: ${{ github.workspace }}/firmware_collection/*

      - name: 📌 Generate Release Tag
        id: tag
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
        run: |
          BUILD_TIME=$(date +"%Y%m%d-%H%M")
          RELEASE_TAG="ImmortalWrt-${BUILD_TIME}"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

          cat > release.txt << EOF
          ## 📦 ImmortalWrt Firmware Release

          **🏷️ Release:** $RELEASE_TAG
          **🌿 Branch:** $REPO_BRANCH
          **📱 Device:** ${DEVICE_INPUT}
          **📅 Build Date:** $(date +"%Y-%m-%d %H:%M:%S")
          **🔨 Compiler:** GCC with ccache

          ## 📥 Download

          Download the firmware files from the assets below.

          ---

          Built with ❤️ using [GitHub Actions](https://github.com/features/actions)
          EOF

          echo "status=success" >> $GITHUB_OUTPUT

      - name: 📤 Upload to Release
        uses: softprops/action-gh-release@main
        if: steps.tag.outputs.status == 'success'
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          prerelease: ${{ env.PRERELEASE == 'true' }}
          files: ${{ github.workspace }}/firmware_collection/*

      - name: 🚧 Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 9
